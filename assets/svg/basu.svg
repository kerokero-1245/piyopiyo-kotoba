<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="ばす">
  <!-- white die-cut underlay -->
  <g fill="#ffffff" stroke="#ffffff" stroke-width="15" stroke-linejoin="round" stroke-linecap="round">
    <rect x="24" y="60" width="152" height="88" rx="18"/>
    <circle cx="60" cy="150" r="17"/>
    <circle cx="140" cy="150" r="17"/>
  </g>
  <!-- wheels (behind body) -->
  <circle cx="60" cy="150" r="17" fill="#33302f" stroke="#3d2a1c" stroke-width="3"/>
  <circle cx="140" cy="150" r="17" fill="#33302f" stroke="#3d2a1c" stroke-width="3"/>
  <!-- body -->
  <rect x="24" y="60" width="152" height="88" rx="18" fill="#ffcf3f" stroke="#3d2a1c" stroke-width="3.2"/>
  <!-- windows -->
  <rect x="33" y="74" width="24" height="26" rx="5" fill="#55c2e0" stroke="#3d2a1c" stroke-width="2.4"/>
  <rect x="61" y="74" width="24" height="26" rx="5" fill="#55c2e0" stroke="#3d2a1c" stroke-width="2.4"/>
  <rect x="89" y="74" width="24" height="26" rx="5" fill="#55c2e0" stroke="#3d2a1c" stroke-width="2.4"/>
  <rect x="117" y="74" width="24" height="26" rx="5" fill="#55c2e0" stroke="#3d2a1c" stroke-width="2.4"/>
  <rect x="145" y="74" width="24" height="26" rx="5" fill="#55c2e0" stroke="#3d2a1c" stroke-width="2.4"/>
  <!-- orange stripe -->
  <rect x="25" y="112" width="150" height="14" fill="#ff8a2e"/>
  <path d="M25,112 L175,112 M25,126 L175,126" fill="none" stroke="#3d2a1c" stroke-width="2.6"/>
  <!-- door -->
  <rect x="45" y="104" width="24" height="43" rx="4" fill="#ffdd6b" stroke="#3d2a1c" stroke-width="2.6"/>
  <path d="M57,106 L57,145" fill="none" stroke="#3d2a1c" stroke-width="2" opacity="0.7"/>
  <!-- headlight -->
  <rect x="160" y="130" width="11" height="10" rx="3" fill="#ffe27a" stroke="#3d2a1c" stroke-width="2.2"/>
  <!-- taillight -->
  <rect x="29" y="130" width="10" height="10" rx="3" fill="#ff6a4a" stroke="#3d2a1c" stroke-width="2.2"/>
  <!-- wheel hubs -->
  <circle cx="60" cy="150" r="6.5" fill="#cfd3d6" stroke="#3d2a1c" stroke-width="2.2"/>
  <circle cx="140" cy="150" r="6.5" fill="#cfd3d6" stroke="#3d2a1c" stroke-width="2.2"/>
  <!-- gloss -->
  <path d="M40,70 Q100,64 160,70" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
</svg>
