  <path d="M80,134 L120,134 M80,148 L120,148" fill="none" stroke="#3d2a1c" stroke-width="2.6"/>
  <!-- window -->
  <circle cx="100" cy="105" r="17" fill="#ffffff" stroke="#3d2a1c" stroke-width="3"/>
  <circle cx="100" cy="105" r="12" fill="#55c2e0" stroke="#3d2a1c" stroke-width="2.4"/>
  <path d="M94,100 Q98,96 103,98" fill="none" stroke="#ffffff" stroke-width="2.6" stroke-linecap="round" opacity="0.85"/>
