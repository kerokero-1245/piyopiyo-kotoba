<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="しょうぼうしゃ">
  <!-- white die-cut underlay -->
  <g fill="#ffffff" stroke="#ffffff" stroke-width="15" stroke-linejoin="round" stroke-linecap="round">
    <rect x="22" y="104" width="156" height="44" rx="10"/>
    <rect x="128" y="72" width="50" height="44" rx="10"/>
    <g transform="rotate(-14 78 82)"><rect x="24" y="72" width="106" height="18" rx="6"/></g>
    <circle cx="58" cy="150" r="19"/>
    <circle cx="142" cy="150" r="19"/>
  </g>
  <!-- wheels (behind body) -->
  <circle cx="58" cy="150" r="19" fill="#33302f" stroke="#3d2a1c" stroke-width="3"/>
  <circle cx="142" cy="150" r="19" fill="#33302f" stroke="#3d2a1c" stroke-width="3"/>
  <!-- ladder -->
  <g transform="rotate(-14 78 82)">
    <rect x="24" y="72" width="106" height="18" rx="6" fill="#c3c8ce" stroke="#3d2a1c" stroke-width="3"/>
    <path d="M40,72 L40,90 M56,72 L56,90 M72,72 L72,90 M88,72 L88,90 M104,72 L104,90 M118,72 L118,90" fill="none" stroke="#8f959c" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- body bed -->
  <rect x="22" y="104" width="156" height="44" rx="10" fill="#f0463a" stroke="#3d2a1c" stroke-width="3.2"/>
  <!-- cab -->
  <rect x="128" y="72" width="50" height="44" rx="10" fill="#f0463a" stroke="#3d2a1c" stroke-width="3.2"/>
  <!-- cab window -->
  <rect x="138" y="80" width="30" height="20" rx="4" fill="#55c2e0" stroke="#3d2a1c" stroke-width="2.6"/>
  <!-- beacon -->
  <rect x="146" y="62" width="16" height="11" rx="4" fill="#3a7bd6" stroke="#3d2a1c" stroke-width="2.4"/>
  <!-- silver stripe -->
  <rect x="24" y="132" width="102" height="9" fill="#d5d9de"/>
  <path d="M24,132 L126,132 M24,141 L126,141" fill="none" stroke="#3d2a1c" stroke-width="2"/>
  <!-- roller shutter lines -->
  <path d="M42,109 L42,128 M56,109 L56,128 M70,109 L70,128 M84,109 L84,128 M98,109 L98,128 M112,109 L112,128" fill="none" stroke="#c0362d" stroke-width="2" stroke-linecap="round" opacity="0.75"/>
  <!-- wheel hubs -->
  <circle cx="58" cy="150" r="7" fill="#cfd3d6" stroke="#3d2a1c" stroke-width="2.2"/>
  <circle cx="142" cy="150" r="7" fill="#cfd3d6" stroke="#3d2a1c" stroke-width="2.2"/>
</svg>
