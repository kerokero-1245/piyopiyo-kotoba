  <ellipse cx="140" cy="68" rx="8" ry="4.5" transform="rotate(22 140 68)" fill="#D99B3E"/>
  <!-- ossicones -->
  <rect x="81.5" y="30" width="7" height="26" rx="3.5" fill="#E0A94A" stroke="#3d2a1c" stroke-width="2.6"/>
  <rect x="111.5" y="30" width="7" height="26" rx="3.5" fill="#E0A94A" stroke="#3d2a1c" stroke-width="2.6"/>
  <circle cx="85" cy="27" r="8" fill="#7A5A34" stroke="#3d2a1c" stroke-width="2.6"/>
