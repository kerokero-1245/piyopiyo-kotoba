    <ellipse cx="138" cy="68" rx="16" ry="9" transform="rotate(22 138 68)"/>
    <rect x="81.5" y="30" width="7" height="26" rx="3.5"/>
    <rect x="111.5" y="30" width="7" height="26" rx="3.5"/>
    <circle cx="85" cy="27" r="8"/>
