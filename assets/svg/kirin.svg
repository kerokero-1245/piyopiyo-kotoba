  <!-- head -->
  <ellipse cx="100" cy="86" rx="34" ry="40" fill="#F5C24E" stroke="#3d2a1c" stroke-width="3.2"/>
  <!-- spots -->
  <g fill="#C8873A">
    <ellipse cx="82" cy="72" rx="8" ry="7"/>
    <ellipse cx="117" cy="74" rx="8" ry="7"/>
    <ellipse cx="79" cy="130" rx="9" ry="8"/>
    <ellipse cx="114" cy="132" rx="9" ry="8"/>
    <ellipse cx="96" cy="155" rx="9" ry="8"/>
    <ellipse cx="122" cy="160" rx="8" ry="7"/>
    <ellipse cx="80" cy="166" rx="8" ry="7"/>
  </g>
  <!-- muzzle -->
  <ellipse cx="100" cy="106" rx="22" ry="15" fill="#FBE1A4" stroke="#3d2a1c" stroke-width="2.4"/>
  <!-- nostrils -->
  <ellipse cx="92" cy="104" rx="2.5" ry="3.5" fill="#B5772F"/>
  <ellipse cx="108" cy="104" rx="2.5" ry="3.5" fill="#B5772F"/>
