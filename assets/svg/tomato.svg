<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="とまと">
  <!-- white die-cut underlay -->
  <g fill="#ffffff" stroke="#ffffff" stroke-width="15" stroke-linejoin="round" stroke-linecap="round">
    <ellipse cx="100" cy="116" rx="60" ry="54"/>
    <rect x="94" y="42" width="12" height="22" rx="5"/>
    <path d="M100,44 L110,58 L128,58 L112,70 L118,82 L100,76 L82,82 L88,70 L72,58 L90,58 Z"/>
  </g>
  <!-- body -->
  <ellipse fill="#ef3b2c" stroke="#3d2a1c" stroke-width="3.2" cx="100" cy="116" rx="60" ry="54"/>
  <!-- lower shading -->
  <path fill="#c9271c" opacity="0.40" d="M52,128 Q68,172 100,170 Q132,172 148,128 Q120,150 100,150 Q80,150 52,128 Z"/>
  <!-- glossy highlight -->
  <ellipse fill="#ffffff" opacity="0.32" cx="78" cy="98" rx="16" ry="11" transform="rotate(-24 78 98)"/>
  <ellipse fill="#ffffff" opacity="0.9" cx="70" cy="92" rx="5" ry="3.5" transform="rotate(-24 70 92)"/>
  <!-- stem -->
  <rect fill="#4f9c3f" stroke="#3d2a1c" stroke-width="3" x="94" y="42" width="12" height="22" rx="5"/>
  <!-- calyx (5-point green star) -->
  <path fill="#57ac47" stroke="#3d2a1c" stroke-width="3.2" stroke-linejoin="round"
        d="M100,44 L110,58 L128,58 L112,70 L118,82 L100,76 L82,82 L88,70 L72,58 L90,58 Z"/>
  <path fill="#3d8a34" opacity="0.5" d="M100,76 L112,70 L118,82 Z"/>
  <!-- face -->
  <g>
    <ellipse fill="#ff7ba0" opacity="0.8" cx="72" cy="128" rx="9" ry="6"/>
    <ellipse fill="#ff7ba0" opacity="0.8" cx="128" cy="128" rx="9" ry="6"/>
    <circle fill="#2a1e16" cx="84" cy="114" r="8"/>
    <circle fill="#2a1e16" cx="116" cy="114" r="8"/>
    <circle fill="#ffffff" cx="87" cy="111" r="3"/>
    <circle fill="#ffffff" cx="119" cy="111" r="3"/>
    <path fill="none" stroke="#3d2a1c" stroke-width="3" stroke-linecap="round" d="M92,128 Q100,135 108,128"/>
  </g>
</svg>
